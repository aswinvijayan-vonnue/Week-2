<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./interactive.css" />
  </head>
  <body>
    <h1>CSS Only accordian</h1>
    <div class="accordian">
      <label for="label">Click here</label>
      <input type="checkbox" id="label" />
      <div class="content">This is the content</div>
    </div>
    <h1>Tabs Component</h1>
    <div class="tab">
      <div class="tb1">
        <label for="tab1">Tab1</label>
        <input type="radio" id="tab1" name="tab" />
        <div class="tab1-content">This is the content in tab1</div>
      </div>
      <div class="tb2">
        <label for="tab2">Tab2</label>
        <input type="radio" id="tab2" name="tab" />
        <div class="tab2-content">This is the content in tab2</div>
      </div>
    </div>
    <h1>Star Rating</h1>
    <div class="rating">
      <label for="star1"></label>
      <input type="radio" name="star" id="star1" />
      <label for="star2"></label>
      <input type="radio" name="star" id="star2" />
      <label for="star3"></label>
      <input type="radio" name="star" id="star3" />
      <label for="star4"></label>
      <input type="radio" name="star" id="star4" />
      <label for="star5"></label>
      <input type="radio" name="star" id="star5" />
    </div>
  </body>
</html>
