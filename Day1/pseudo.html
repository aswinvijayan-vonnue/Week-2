<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./pseudo.css" />
    <title>Pseudo- Classes</title>
  </head>
  <body>
    <header>
      <h1>Pseudo Classes and pseudo elements</h1>
      <nav class="nav-bar">
        <ul>
          <li><a class="focus-visible" href="#">Home</a></li>
          <li><a href="#" class="focus-visible">About</a></li>
          <li><a href="#" class="focus">Services</a></li>
          <li><a href="#" class="focus">Contact</a></li>
        </ul>
      </nav>
    </header>
    <main>
      <form>
        <input type="checkbox" id="check-box" />
        <label for="check-box" class="check-label">Checked</label>
      </form>
      <ol class="fruits">
        <li>Apple</li>
        <li>Mango</li>
        <li>Banana</li>
        <li>Orange</li>
      </ol>
      <div class="tooltip">
        <p class="tooltip" data-tooltip=" This is the content from tool tip">
          Tool tip text : 
        </p>
      </div>
    </main>
  </body>
</html>
