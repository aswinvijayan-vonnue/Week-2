<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./calender.css" />
    <title>Document</title>
  </head>
  <body>
    <h1>Calender,  June 2026</h1>
    <div class="calender">
      <div class="week-name">
        <div class="week-names">Weeks</div>
        <div class="week-names">1</div>
        <div class="week-names">2</div>
        <div class="week-names">3</div>
        <div class="week-names">4</div>
        <div class="week-names">5</div>
      </div>

      <div class="dates">
        <!-- <div class="week date">Weeks</div> -->
        <div class="week holy date">Sunday</div>
        <div class="week date">Monday</div>
        <div class="week date">Tuesday</div>
        <div class="week date">Wednesday</div>
        <div class="week date">Thursday</div>
        <div class="week date">Friday</div>
        <div class="week date">Saturday</div>
        <!-- <div class="week">1</div> -->
        <div class="date" id="first-day">1</div>
        <div class="date">2</div>
        <div class="date">3</div>
        <div class="date">4</div>
        <!-- <div class="week">2</div> -->
        <div class="date holy">5</div>
        <div class="date">6</div>
        <div class="date">7</div>
        <div class="date event">8</div>
        <div class="date">9</div>
        <div class="date">10</div>
        <div class="date holy">11</div>
        <!-- <div class="week">3</div> -->
        <div class="date holy event">12</div>
        <div class="date">13</div>
        <div class="date">14</div>
        <div class="date" id="today">15</div>
        <div class="date">16</div>
        <div class="date">17</div>
        <div class="date">18</div>
        <!-- <div class="week">4</div> -->
        <div class="date holy">19</div>
        <div class="date">20</div>
        <div class="date">21</div>
        <div class="date">22</div>
        <div class="date">23</div>
        <div class="date">24</div>
        <div class="date">25</div>
        <!-- <div class="week">5</div> -->
        <div class="date holy">26</div>
        <div class="date">27</div>
        <div class="date event">28</div>
        <div class="date">29</div>
        <div class="date">30</div>
        <div class="date">31</div>
      </div>
    </div>
  </body>
</html>
